<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPU SATELLITE OPERATIONS CENTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="left-panel">
            <div class="panel-border">
                <canvas id="radarCanvas"></canvas>
            </div>
            <div class="panel-border frequency-display">
                <p>SO-50 U-Downlink: <span class="highlight-text">436.795 MHz</span></p>
                <p>IO-86 U-Downlink: <span class="highlight-text">435.880 MHz</span></p>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-border data-box">
                <div class="panel-header-title">LIVE TELEMETRY</div>
                <table class="soc-table">
                    <thead>
                        <tr>
                            <th>SAT</th>
                            <th>AZ</th>
                            <th>EL</th>
                            <th>RANGE</th>
                            <th>DOPPLER RX</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="telemetryData">
                        </tbody>
                </table>
            </div>

            <div class="panel-border data-box" style="margin-top: 15px;">
                <div class="panel-header-title">COMM FREQUENCY</div>
                <table class="soc-table">
                    <thead>
                        <tr>
                            <th>SAT</th>
                            <th>AZ</th>
                            <th>EL</th>
                            <th>RANGE</th>
                            <th>DOPPLER RX</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="commData">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 SPU Satellite Operations Center. All Rights Reserved. | SYSTEM DEV: E25YMZ</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPU SATELLITE OPERATIONS CENTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <header>
                <h1>SPU SATELLITE OPERATIONS CENTER</h1>
                <p class="status">SYSTEM ONLINE - TRACKING ACTIVE</p>
            </header>
            
            <div class="radar-box">
                <canvas id="radarCanvas" width="500" height="500"></canvas>
                <div class="radar-label">POLAR TRACKING (AZ/EL)</div>
            </div>

            <div class="freq-box">
                <h3>COMM FREQUENCIES (CENTER)</h3>
                <div id="freqData"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="clock-box">
                <div id="liveClock">00:00:00 ICT</div>
            </div>

            <div class="telemetry-box">
                <h3>LIVE TELEMETRY & DOPPLER SHIFT</h3>
                <div class="table-header">
                    <span>SAT</span>
                    <span>AZ</span>
                    <span>EL</span>
                    <span>RANGE</span>
                    <span>DOPPLER RX</span>
                    <span>STATUS</span>
                </div>
                <div id="telemetryData">
                    </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 SPU SATELLITE OPERATIONS CENTER. All Rights Reserved. | SYSTEM DEV: E25YMZ</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
